{% extends "base.html" %}
{% block title %}Policies{% endblock %}

{% block content %}
<div class="p-4">
    <h4 class="mb-4"><i class="bi bi-file-earmark-ruled"></i> Firewall Policies</h4>

    {% if not policies %}
    <div class="alert alert-secondary">No firewall policies found in this domain.</div>
    {% else %}
    <div class="row g-3">
        {% for p in policies %}
        <div class="col-md-6 col-lg-4">
            <div class="card h-100">
                <div class="card-body">
                    <h6 class="card-title">
                        <i class="bi bi-shield-check text-primary"></i>
                        {{ p.name }}
                    </h6>
                    <div class="text-muted" style="font-size:0.7rem; word-break:break-all;">
                        {{ p.href }}
                    </div>
                </div>
                <div class="card-footer d-flex gap-2">
                    <a href="/policy/{{ p.name }}" class="btn btn-sm btn-outline-primary">
                        <i class="bi bi-list-ol"></i> View Rules
                    </a>
                    <a href="/sandbox?policy={{ p.name }}" class="btn btn-sm btn-outline-warning">
                        <i class="bi bi-box"></i> Sandbox
                    </a>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
    {% endif %}
</div>
{% endblock %}
