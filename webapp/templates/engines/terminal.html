<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSH · {{ cred.engine_name }}/node-{{ cred.node_id }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/xterm@5.5.0/css/xterm.min.css" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; background: #0d1117; height: 100vh; display: flex; flex-direction: column; }
        .term-bar {
            background: #161b22; color: #c9d1d9; padding: 0.4rem 0.8rem;
            border-bottom: 1px solid #30363d; display: flex; gap: 1rem;
            align-items: center; font-size: 0.82rem;
        }
        .term-bar .badge { font-size: 0.7rem; }
        .term-bar .status { margin-left: auto; }
        #terminal { flex: 1; padding: 0.4rem; min-height: 0; }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 4px; }
        .status-connecting { background: #f0b400; }
        .status-open       { background: #2ea043; }
        .status-closed     { background: #f85149; }
    </style>
</head>
<body>
    <div class="term-bar">
        <span><i class="bi bi-terminal-fill"></i></span>
        <strong>{{ cred.engine_name }}</strong>
        <span class="badge bg-secondary">node {{ cred.node_id }}</span>
        <code style="color:#8b949e;">{{ cred.ssh_username }}@{{ cred.hostname }}:{{ cred.ssh_port or 22 }}</code>
        <span class="status">
            <span id="statusDot" class="status-dot status-connecting"></span>
            <span id="statusText">connecting…</span>
        </span>
    </div>
    <div id="terminal"></div>

    <script src="https://cdn.jsdelivr.net/npm/xterm@5.5.0/lib/xterm.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.10.0/lib/xterm-addon-fit.min.js"></script>
    <script>
        (function () {
            const term = new Terminal({
                cursorBlink: true,
                fontSize: 13,
                fontFamily: '"SFMono-Regular","Menlo","Consolas",monospace',
                theme: { background: '#0d1117', foreground: '#c9d1d9' },
            });
            const fitAddon = new FitAddon.FitAddon();
            term.loadAddon(fitAddon);
            term.open(document.getElementById('terminal'));
            fitAddon.fit();

            const dot  = document.getElementById('statusDot');
            const txt  = document.getElementById('statusText');
            function setStatus(state, label) {
                dot.className = 'status-dot status-' + state;
                txt.textContent = label;
            }

            const proto = window.location.protocol === 'https:' ? 'wss://' : 'ws://';
            const ws = new WebSocket(proto + window.location.host + {{ ws_path|tojson }});
            ws.binaryType = 'arraybuffer';

            ws.onopen = function () {
                setStatus('open', 'connected');
                sendResize();
            };
            ws.onmessage = function (ev) {
                if (typeof ev.data === 'string') {
                    term.write(ev.data);
                } else {
                    term.write(new Uint8Array(ev.data));
                }
            };
            ws.onclose = function (ev) {
                setStatus('closed', 'disconnected' + (ev.reason ? ' — ' + ev.reason : ''));
                term.write('\r\n\x1b[33m*** Session closed ***\x1b[0m\r\n');
            };
            ws.onerror = function () {
                setStatus('closed', 'error');
            };

            term.onData(function (data) {
                if (ws.readyState === WebSocket.OPEN) {
                    ws.send(data);
                }
            });

            function sendResize() {
                if (ws.readyState !== WebSocket.OPEN) return;
                const payload = JSON.stringify({ type: 'resize', cols: term.cols, rows: term.rows });
                ws.send('\x00' + payload);
            }

            window.addEventListener('resize', function () {
                fitAddon.fit();
                sendResize();
            });

            window.addEventListener('beforeunload', function () {
                try { ws.close(); } catch (e) {}
            });

            term.focus();
        })();
    </script>
</body>
</html>
