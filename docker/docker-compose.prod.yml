# FlexEdgeAdmin — Production Docker Compose (overlay)
#
# Usage:
#   docker compose -f docker/docker-compose.yml -f docker/docker-compose.prod.yml up -d --build
#
# This overlays the base docker-compose.yml with:
#   - nginx reverse proxy with TLS (Let's Encrypt)
#   - certbot sidecar for automated certificate renewal
#   - flexedge-web only exposed internally (no direct port mapping)
#
# First-time TLS setup:
#   1. Set DOMAIN and CERTBOT_EMAIL in .env
#   2. Start services:
#      docker compose -f docker/docker-compose.yml -f docker/docker-compose.prod.yml up -d
#   3. Obtain initial certificate:
#      docker compose -f docker/docker-compose.yml -f docker/docker-compose.prod.yml \
#        run --rm certbot certonly --webroot -w /var/www/certbot \
#        -d ${DOMAIN} --email ${CERTBOT_EMAIL} --agree-tos --non-interactive
#   4. Restart nginx to pick up the certificate:
#      docker compose -f docker/docker-compose.yml -f docker/docker-compose.prod.yml restart nginx

services:
  flexedge-web:
    # Override: remove direct port mapping (nginx proxies instead)
    ports: !override
      - "127.0.0.1:8088:8088"

  nginx:
    image: nginx:alpine
    container_name: flexedge-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot-data:/etc/letsencrypt:ro
      - certbot-webroot:/var/www/certbot:ro
    depends_on:
      - flexedge-web
    environment:
      - DOMAIN=${DOMAIN:-localhost}

  certbot:
    image: certbot/certbot
    container_name: flexedge-certbot
    volumes:
      - certbot-data:/etc/letsencrypt
      - certbot-webroot:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --quiet; sleep 12h & wait $${!}; done'"

volumes:
  certbot-data:
  certbot-webroot:
